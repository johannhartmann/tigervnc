name: Build

on: [push, pull_request]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERBOSE: 1
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfltk1.3-dev fluid gettext appstream
          sudo apt-get install -y libpixman-1-dev libjpeg-turbo8-dev
          sudo apt-get install -y libgnutls28-dev nettle-dev libgmp-dev
          sudo apt-get install -y libxtst-dev libxdamage-dev libxfixes-dev libxrandr-dev libpam-dev
          sudo apt-get install -y libavcodec-dev libavutil-dev libswscale-dev
          sudo apt-get install -y uuid-dev libglib2.0-dev libpipewire-0.3-dev
          sudo apt-get install -y libwayland-dev libxkbcommon-dev
          sudo apt-get install -y libgtest-dev
      - name: Configure
        run: |
          cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_NLS=ON \
            -DENABLE_H264=ON \
            -DENABLE_GNUTLS=ON \
            -DENABLE_NETTLE=ON \
            -DBUILD_VIEWER=ON \
            -S . -B build
      - name: Build
        working-directory: build
        run: make
      - name: Install
        working-directory: build
        run: make tarball
      - uses: actions/upload-artifact@v4
        with:
          name: Linux (Ubuntu)
          path: build/tigervnc-*.tar.gz
      - name: Test
        working-directory: build
        run: ctest --test-dir tests/unit/ --output-junit test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-linux
          path: build/tests/unit/test-results.xml

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      VERBOSE: 1
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          update: true
      - name: Install dependencies
        run: |
          pacman --sync --noconfirm --needed \
            make mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake
          pacman --sync --noconfirm --needed \
            mingw-w64-x86_64-fltk1.3 mingw-w64-x86_64-libjpeg-turbo \
            mingw-w64-x86_64-gnutls mingw-w64-x86_64-pixman \
            mingw-w64-x86_64-nettle mingw-w64-x86_64-gmp \
            mingw-w64-x86_64-gtest
      - name: Configure
        run: |
          cmake \
            -G "MSYS Makefiles" \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_NLS=ON \
            -DENABLE_H264=ON \
            -DENABLE_GNUTLS=ON \
            -DENABLE_NETTLE=ON \
            -DBUILD_VIEWER=ON \
            -S . -B build
      - name: Build
        working-directory: build
        run: make
      - name: Install
        working-directory: build
        env:
          MSYS2_PATH_TYPE: inherit
        run: make installer winvnc_installer
      - uses: actions/upload-artifact@v4
        with:
          name: Windows
          path: build/release/tigervnc*.exe
      - name: Test
        working-directory: build
        run: ctest --test-dir tests/unit/ --output-junit test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-windows
          path: build/tests/unit/test-results.xml

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 20
    env:
      VERBOSE: 1
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          brew install fltk@1.3 pixman ffmpeg
          brew install gnutls nettle gmp
          brew install googletest
          brew link fltk@1.3
      - name: Configure
        run: |
          cmake \
            -DCMAKE_BUILD_TYPE=Debug \
            -DENABLE_NLS=ON \
            -DENABLE_H264=ON \
            -DENABLE_GNUTLS=ON \
            -DENABLE_NETTLE=ON \
            -DENABLE_WAYLAND=ON \
            -DBUILD_VIEWER=ON \
            -S . -B build
      - name: Build
        working-directory: build
        run: make
      - name: Install
        working-directory: build
        run: make dmg
      - uses: actions/upload-artifact@v4
        with:
          name: macOS
          path: build/release/TigerVNC-*.dmg
      - name: Test
        working-directory: build
        run: ctest --test-dir tests/unit/ --output-junit test-results.xml
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-macos
          path: build/tests/unit/test-results.xml

  package-windows:
    name: Installer (${{ matrix.arch }})
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: windows-latest
            msystem: MINGW64
            pkg_prefix: mingw-w64-x86_64
            installer_glob: tigervnc*.exe
          - arch: arm64
            runner: windows-11-arm
            msystem: CLANGARM64
            pkg_prefix: mingw-w64-clang-aarch64
            installer_glob: tigervnc*.exe
    runs-on: ${{ matrix.runner }}
    env:
      VERBOSE: 1
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            ${{ matrix.pkg_prefix }}-toolchain
            ${{ matrix.pkg_prefix }}-cmake
            ${{ matrix.pkg_prefix }}-ninja
            ${{ matrix.pkg_prefix }}-pkgconf
            ${{ matrix.pkg_prefix }}-zlib
            ${{ matrix.pkg_prefix }}-pixman
            ${{ matrix.pkg_prefix }}-libjpeg-turbo
            ${{ matrix.pkg_prefix }}-fltk1.3
            ${{ matrix.pkg_prefix }}-gnutls
            ${{ matrix.pkg_prefix }}-nettle
      - name: Locate Inno Setup
        shell: pwsh
        run: |
          $iscc = Get-ChildItem `
            'C:\Program Files (x86)\Inno Setup 6', `
            'C:\Program Files\Inno Setup 6' `
            -ErrorAction SilentlyContinue -Filter ISCC.exe -Recurse |
            Select-Object -First 1
          if (-not $iscc) {
            choco install innosetup -y --no-progress
            $iscc = Get-ChildItem `
              'C:\Program Files (x86)\Inno Setup 6', `
              'C:\Program Files\Inno Setup 6' `
              -ErrorAction SilentlyContinue -Filter ISCC.exe -Recurse |
              Select-Object -First 1
          }
          if (-not $iscc) { throw 'ISCC.exe not found after install' }
          Add-Content -Path $env:GITHUB_PATH -Value $iscc.Directory.FullName
      - name: Configure
        run: |
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_GNUTLS=ON \
            -DENABLE_NETTLE=ON \
            -DENABLE_NLS=OFF \
            -DENABLE_H264=OFF \
            -DBUILD_VIEWER=ON \
            -S . -B build
      - name: Build
        run: cmake --build build
      - name: Build installers
        env:
          MSYS2_PATH_TYPE: inherit
        run: |
          cmake --build build --target installer
          cmake --build build --target winvnc_installer
      - uses: actions/upload-artifact@v4
        with:
          name: tigervnc-windows-${{ matrix.arch }}
          path: build/release/${{ matrix.installer_glob }}
          if-no-files-found: error

  release-windows:
    name: Attach installers to release
    needs: package-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: tigervnc-windows-*
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.exe
          fail_on_unmatched_files: true

  build-java:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      VERBOSE: 1
    strategy:
      matrix:
        java: [ '8', '11', '17', '21' ]
    steps:
      - uses: actions/checkout@v4
      - name: Setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java }}
      - name: Configure
        working-directory: java
        run: cmake -DCMAKE_BUILD_TYPE=Debug -S . -B build
      - name: Build
        working-directory: java/build
        run: make
      - uses: actions/upload-artifact@v4
        with:
          name: Java (${{ matrix.java }})
          path: java/build/VncViewer.jar

  build-packages:
    timeout-minutes: 20
    strategy:
      matrix:
        target:
          - rocky8
          - rocky9
          - rocky10
          - jammy
          - noble
      fail-fast: false
    runs-on: ubuntu-latest
    env:
      DOCKER: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t tigervnc/$DOCKER .github/containers/$DOCKER
      - name: Build packages
        run: .github/containers/$DOCKER/build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: Packages (${{ matrix.target }})
          path: .github/containers/${{ matrix.target }}/result
